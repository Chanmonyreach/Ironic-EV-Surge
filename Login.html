<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Energy Meter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="Login_style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="Gauge-Chart.js" defer></script>
    <script src="line-Chart.js" defer></script>
    <script src="Login_script.js" defer></script>
</head>
<body>
    <section id="banner"> 
        <div id="topnav">
            <img src="Image/LOGO.png" class="LOGO" alt="Logo">
            <nav>
                <ul>
                    <li><a href="#" class="active" data-section="home"><i class="fas fa-home" style="font-size: 1em;"></i> Home</a></li>
                    <li><a href="#" data-section="wallet"><i class="fas fa-wallet" style="font-size: 1em;"></i> Wallet</a></li>
                    <li><a href="#" data-section="activity"><i class="fas fa-chart-line" style="font-size: 1em;"></i> Activity</a></li>
                    <li><a href="#" data-section="notification"> <i class="fas fa-bell" style="font-size: 1em;"></i> notification</a></li>
                    <li><a href="#" id="accountBtnTopbar"><i class="fas fa-user" style="font-size: 1.5em;"></i></a></li>
                </ul>                
            </nav>
        </div> 
        <div id="sidenav">
            <ul>
                <li><a href="#"><i class="fas fa-user"></i>Profile</a></li>
                <li><a href="#"><i class="fas fa-cog"></i>Settings</a></li>
                <li><a href="index.html"><i class="fas fa-sign-out-alt"></i>Logout</a></li>
            </ul>
        </div>
        <div class="content-wrapper">
            <section id="home" class="content-section active">
                <h1>Charging Process</h1>
                <div class="chart-container">
                    <div class="chart"> 
                        <canvas id="Powers-Gauge-Chart" width="400" height="400"></canvas>
                        <a>Process</a>
                    </div>
                </div>
            </section>
            <section id="wallet" class="content-section">
                <ul>
                    <li><a>a</a></li>
                </ul>
            </section>
            <section id="activity" class="content-section">
                <div class="chart-container">
                    <div class="chart">
                        <canvas id="line-Chart" width="800" height="400"></canvas>s
                        <b>Power Usage Monthly</b>
                    </div>
                </div>
            </section> 
            <section id="notification" class="content-section"></section>
        </div>    
    </section>
</body>
</html>
